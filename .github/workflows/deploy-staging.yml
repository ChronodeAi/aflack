name: Deploy Staging

on:
  push:
    branches: [main]

jobs:
  build-and-publish-staging:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Pre-deploy checks (lint, typecheck, test)
        run: |
          uv run ruff check src tests
          uv run ruff format --check src tests
          uv run mypy src
          uv run python -m pytest tests/ --tb=short -q

      - name: Build package
        run: uv build

      - name: Track build performance
        run: uv run python scripts/track_build_performance.py --skip-tests

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: staging-build-${{ github.sha }}
          path: dist/
          retention-days: 30

      - name: Check for dead feature flags
        run: uv run python scripts/detect_dead_flags.py || true

      - name: Staging deployment summary
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const summary = `## Staging Build Deployed
            - **Commit**: ${{ github.sha }}
            - **Branch**: ${{ github.ref_name }}
            - **Artifacts**: Available for 30 days
            - **Status**: ${{ job.status }}
            Built package is available as a workflow artifact for testing before production release.`;
            core.summary.addRaw(summary);
            await core.summary.write();
