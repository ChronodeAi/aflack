name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Compile check
        run: uv run python -m compileall -q src

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Format check (ruff)
        run: uv run ruff format --check src tests

      - name: Type check (mypy)
        run: uv run mypy src

      - name: Tests with coverage
        run: uv run python -m pytest tests/ --tb=short -q

      - name: Dead code detection (vulture)
        run: uv run vulture src --min-confidence 80 || true

      - name: Complexity check (radon)
        run: uv run radon cc -nc -s src/ || true

      - name: Unused dependencies (deptry)
        run: uv run deptry . || true

      - name: Duplicate code detection (jscpd)
        run: npx --yes jscpd src/ --min-lines 5 --format json --reporters json || true

      - name: TODO/FIXME scanner
        run: |
          if grep -rnE 'TODO|FIXME' src/ --include='*.py' | grep -vE 'TODO\([A-Z]+-[0-9]+\)|FIXME\([A-Z]+-[0-9]+\)' | head -1; then
            echo "::warning::Found TODO/FIXME without issue reference"
          fi

      - name: Build performance tracking
        run: uv run python scripts/track_build_performance.py --skip-tests

      - name: Dead feature flag detection
        run: uv run python scripts/detect_dead_flags.py || true
